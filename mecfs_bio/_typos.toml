[files]
# Data files of UKB-PPP gene symbols; not prose, and full of legitimate gene names
# (SORD, SPRED2, STIP1, WNT9A, ...) that trip the spellchecker. One manifest per cohort.
extend-exclude = ["**/*_ppp_manifest.csv"]

[default.extend-words]
ser="ser"
setp="setp"
Ponting="Ponting"
Catagories="Catagories" # this typo is produced in the LDSC output
HSA="HSA"
hsa="hsa"
Wirth="Wirth"