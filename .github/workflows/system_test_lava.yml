name: system_test_lava
on:
  schedule:
    - cron: "0 4 * * 3"   #Run Wednesday at 4 UTC
  workflow_dispatch: {}

jobs:
  lead_variants:
    timeout-minutes: 600
    name: Run Lava
    runs-on: ubuntu-latest
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4
      - uses: prefix-dev/setup-pixi@v0.9.2
        name: Setup Pixi Environment
        with:
          pixi-version: v0.55.0
          cache: true
      - name: Install R packages
        run: pixi r invoke install-r-packages
        env:
          GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      - name: Run lava integration test
        run:  pixi r python -m pytest test_mecfs_bio/system/test_lava.py::test_lava_vignette_data  # run  test using lava example data

