name: system_test_s_lsdc_decode_me
on:
  schedule:
    - cron: "0 4 * * 6"   #Run Saturday at 4 UTC
  workflow_dispatch: {}

jobs:
  lead_variants:
    timeout-minutes: 600
    name: Run S-LSDC
    runs-on: ubuntu-latest
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v6
      - name: Run S-LSDC integration test
        uses: ./.github/actions/run-system-test
        with:
          pytest-target: test_mecfs_bio/system/test_decode_me_s_ldsc.py
